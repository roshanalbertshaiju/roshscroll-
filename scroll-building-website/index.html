<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll-Driven Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scroll-container">
        <section class="hero-section">
            <div class="animation-container">
                <svg id="building-svg" viewBox="0 0 1000 800" preserveAspectRatio="xMidYMax meet">
                    <!-- Definitions -->
                    <defs>
                        <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="5" result="blur" />
                            <feComposite in="SourceGraphic" in2="blur" operator="over" />
                        </filter>
                        
                        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>
                        </pattern>
                    </defs>

                    <!-- Background Grid -->
                    <rect width="1000" height="800" fill="url(#grid)" />
                    
                    <!-- Ground Level Grid -->
                    <g class="ground-grid">
                        <line x1="0" y1="750" x2="1000" y2="750" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
                        <line x1="0" y1="770" x2="1000" y2="770" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
                        <line x1="0" y1="790" x2="1000" y2="790" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
                    </g>
                    
                    <!-- Main Building Wrapper with Glow -->
                    <g class="building-wrapper" stroke="#e0e0e0" fill="none" stroke-width="3" filter="url(#neon-glow)" stroke-linecap="round" stroke-linejoin="round">
                        
                        <!-- Foundation & Ground Floor (0 - 15%) -->
                        <g id="foundation">
                            <path class="draw-path foundation-path" d="M 300 750 L 700 750 L 700 680 L 300 680 Z" />
                            <line class="draw-path foundation-path" x1="400" y1="750" x2="400" y2="680" />
                            <line class="draw-path foundation-path" x1="500" y1="750" x2="500" y2="680" />
                            <line class="draw-path foundation-path" x1="600" y1="750" x2="600" y2="680" />
                        </g>

                        <!-- Floors (15% - 40%) -->
                        <g id="floors">
                            <!-- Floor 1 -->
                            <rect class="draw-path floor-path f1" x="320" y="610" width="360" height="70" />
                            <!-- Floor 2 -->
                            <rect class="draw-path floor-path f2" x="320" y="540" width="360" height="70" />
                            <!-- Floor 3 -->
                            <rect class="draw-path floor-path f3" x="320" y="470" width="360" height="70" />
                            <!-- Floor 4 -->
                            <rect class="draw-path floor-path f4" x="340" y="400" width="320" height="70" />
                            <!-- Floor 5 -->
                            <rect class="draw-path floor-path f5" x="340" y="330" width="320" height="70" />
                            <!-- Floor 6 -->
                            <rect class="draw-path floor-path f6" x="360" y="260" width="280" height="70" />
                        </g>

                        <!-- Windows (40% - 65%) -->
                        <g id="windows" fill="none" stroke="#8ab4f8" stroke-width="2">
                            <!-- Floor 1 Windows -->
                            <rect class="draw-path window-path w1" x="340" y="630" width="40" height="30" />
                            <rect class="draw-path window-path w1" x="400" y="630" width="40" height="30" />
                            <rect class="draw-path window-path w1" x="460" y="630" width="40" height="30" />
                            <rect class="draw-path window-path w1" x="520" y="630" width="40" height="30" />
                            <rect class="draw-path window-path w1" x="580" y="630" width="40" height="30" />
                            <rect class="draw-path window-path w1" x="640" y="630" width="40" height="30" />

                            <!-- Floor 2 Windows -->
                            <rect class="draw-path window-path w2" x="340" y="560" width="40" height="30" />
                            <rect class="draw-path window-path w2" x="400" y="560" width="40" height="30" />
                            <rect class="draw-path window-path w2" x="460" y="560" width="40" height="30" />
                            <rect class="draw-path window-path w2" x="520" y="560" width="40" height="30" />
                            <rect class="draw-path window-path w2" x="580" y="560" width="40" height="30" />
                            <rect class="draw-path window-path w2" x="640" y="560" width="40" height="30" />

                            <!-- Floor 3 Windows -->
                            <rect class="draw-path window-path w3" x="340" y="490" width="40" height="30" />
                            <rect class="draw-path window-path w3" x="400" y="490" width="40" height="30" />
                            <rect class="draw-path window-path w3" x="460" y="490" width="40" height="30" />
                            <rect class="draw-path window-path w3" x="520" y="490" width="40" height="30" />
                            <rect class="draw-path window-path w3" x="580" y="490" width="40" height="30" />
                            <rect class="draw-path window-path w3" x="640" y="490" width="40" height="30" />

                            <!-- Floor 4 Windows -->
                            <rect class="draw-path window-path w4" x="360" y="420" width="40" height="30" />
                            <rect class="draw-path window-path w4" x="420" y="420" width="40" height="30" />
                            <rect class="draw-path window-path w4" x="480" y="420" width="40" height="30" />
                            <rect class="draw-path window-path w4" x="540" y="420" width="40" height="30" />
                            <rect class="draw-path window-path w4" x="600" y="420" width="40" height="30" />

                            <!-- Floor 5 Windows -->
                            <rect class="draw-path window-path w5" x="360" y="350" width="40" height="30" />
                            <rect class="draw-path window-path w5" x="420" y="350" width="40" height="30" />
                            <rect class="draw-path window-path w5" x="480" y="350" width="40" height="30" />
                            <rect class="draw-path window-path w5" x="540" y="350" width="40" height="30" />
                            <rect class="draw-path window-path w5" x="600" y="350" width="40" height="30" />

                            <!-- Floor 6 Windows -->
                            <rect class="draw-path window-path w6" x="380" y="280" width="40" height="30" />
                            <rect class="draw-path window-path w6" x="440" y="280" width="40" height="30" />
                            <rect class="draw-path window-path w6" x="500" y="280" width="40" height="30" />
                            <rect class="draw-path window-path w6" x="560" y="280" width="40" height="30" />
                        </g>

                        <!-- Roof (65% - 80%) -->
                        <g id="roof">
                            <path class="draw-path roof-path" d="M 360 260 L 500 180 L 640 260 Z" />
                            <circle class="draw-path roof-path" cx="500" cy="180" r="10" />
                            <line class="draw-path roof-path" x1="500" y1="170" x2="500" y2="100" />
                            <circle class="draw-path roof-path" id="beacon" cx="500" cy="100" r="4" fill="#ff4444" stroke="none" />
                        </g>
                    </g>
                    
                    <!-- Lights (Filled rects with opacity, 80% - 100%) -->
                    <g id="lights" fill="rgba(138, 180, 248, 0.4)" stroke="none" opacity="0">
                        <rect x="340" y="630" width="40" height="30" />
                        <rect x="460" y="630" width="40" height="30" />
                        <rect x="640" y="630" width="40" height="30" />
                        
                        <rect x="400" y="560" width="40" height="30" />
                        <rect x="520" y="560" width="40" height="30" />
                        
                        <rect x="340" y="490" width="40" height="30" />
                        <rect x="580" y="490" width="40" height="30" />
                        
                        <rect x="420" y="420" width="40" height="30" />
                        <rect x="480" y="420" width="40" height="30" />
                        
                        <rect x="360" y="350" width="40" height="30" />
                        <rect x="600" y="350" width="40" height="30" />
                        
                        <rect x="500" y="280" width="40" height="30" />
                    </g>

                    <!-- Crane Group -->
                    <g id="crane-group">
                        <g class="crane-body" stroke="#fbc02d" fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                            <line class="draw-path crane-path" x1="200" y1="750" x2="200" y2="200" stroke-width="6"/>
                            <line class="draw-path crane-path" x1="180" y1="750" x2="180" y2="200" stroke-width="6"/>
                            <!-- Crane lattice -->
                            <path class="draw-path crane-path" d="M 180 720 L 200 690 M 180 660 L 200 630 M 180 600 L 200 570 M 180 540 L 200 510 M 180 480 L 200 450 M 180 420 L 200 390 M 180 360 L 200 330 M 180 300 L 200 270 M 180 240 L 200 210" stroke-width="2"/>
                            <!-- Arm -->
                            <path class="draw-path crane-path arm-path" d="M 190 200 L 400 120" stroke-width="8"/>
                            <path class="draw-path crane-path arm-path" d="M 190 200 L 100 230" stroke-width="6"/>
                            <line class="draw-path crane-path arm-path" x1="190" y1="160" x2="190" y2="200" />
                            <line class="draw-path crane-path arm-path" x1="190" y1="160" x2="400" y2="120" stroke-width="2"/>
                            <line class="draw-path crane-path arm-path" x1="190" y1="160" x2="100" y2="230" stroke-width="2"/>
                            <!-- String -->
                            <line class="draw-path crane-path hook-path" x1="380" y1="125" x2="380" y2="300" stroke="#aaa" stroke-width="2"/>
                        </g>
                    </g>
                </svg>
            </div>
        </section>
        
        <!-- Outro Section -->
        <section class="outro-section">
            <h1 class="outro-text">Built different.</h1>
        </section>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
